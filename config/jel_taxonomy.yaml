# JEL classification mapped to readable field labels.
# Used by the keyword/JEL classifier. Keywords are case-insensitive and
# matched against title + abstract.

fields:
  - label: General Economics & Methodology
    jel_prefixes: [A, B]
    keywords: [methodology, history of thought]

  - label: Microeconomics
    jel_prefixes: [D]
    keywords: [household behavior, choice theory, welfare economics, utility]

  - label: Macroeconomics
    jel_prefixes: [E]
    keywords: [inflation, business cycle, monetary policy, fiscal policy, output gap]

  - label: International Economics
    jel_prefixes: [F]
    keywords: [trade, tariff, exchange rate, current account, globalization, FDI]

  - label: Financial Economics
    jel_prefixes: [G]
    keywords: [asset pricing, banking, household finance, corporate finance, risk premium, ETF]

  - label: Public Economics
    jel_prefixes: [H]
    keywords: [taxation, government spending, fiscal, public goods, transfer]

  - label: Health, Education & Welfare
    jel_prefixes: [I]
    keywords: [health, mortality, education, schooling, poverty, inequality, Medicare, Medicaid]

  - label: Labor & Demographic Economics
    jel_prefixes: [J]
    keywords: [wage, employment, unemployment, labor supply, labor demand, minimum wage,
               immigration, gender gap, retirement, fertility]

  - label: Law & Economics
    jel_prefixes: [K]
    keywords: [crime, court, prison, regulation, contract enforcement, legal]

  - label: Industrial Organization
    jel_prefixes: [L]
    keywords: [market structure, antitrust, merger, market power, advertising, oligopoly]

  - label: Business Economics & Innovation
    jel_prefixes: [M, O]
    keywords: [innovation, R&D, productivity, growth, technology adoption, patent]

  - label: Urban, Rural & Regional Economics
    jel_prefixes: [R]
    keywords: [housing, urban, neighborhood, gentrification, real estate, commute, zoning]

  - label: Agricultural & Environmental Economics
    jel_prefixes: [Q]
    keywords: [agriculture, climate, pollution, energy, emission, environmental, water]

  - label: Econometrics & Methods
    jel_prefixes: [C]
    keywords: [instrumental variable, difference in differences, regression discontinuity,
               synthetic control, machine learning, structural estimation, identification strategy]

  - label: Political Economy
    jel_prefixes: [P]
    keywords: [political economy, voting, election, democracy, autocracy, conflict, war]

# Method tags. ORTHOGONAL to fields — a Labor paper can also be tagged DiD,
# a Macro paper can also be tagged Structural, etc. Stored in `fields` with
# a "method:" prefix so the dashboard can split them visually.
#
# Each method is a first-class label, not a sub-bucket: papers get tagged
# "DiD" or "RDD" specifically rather than the coarse "Applied Micro".
#
# Case rule: a keyword with any uppercase letter matches case-sensitively
# (so "DiD" doesn't fire on every English "did"; "IV" doesn't fire on
# Roman numerals; "RCT"/"TWFE" require the all-caps form). Fully-lowercase
# keywords are matched case-insensitively.
method_tags:
  - label: DiD
    keywords: [difference-in-differences, difference in differences, "diff-in-diff",
               "DiD", "DID estimator", "DID design", "two-way fixed effects",
               "TWFE", staggered adoption, "event study", parallel trends]
  - label: RDD
    keywords: [regression discontinuity, "RD design", "RDD",
               running variable, sharp discontinuity, fuzzy discontinuity,
               bandwidth selection, McCrary test]
  - label: IV
    keywords: [instrumental variable, "IV strategy", "IV estimate", "IV approach",
               "2SLS", "two-stage least squares", "GMM",
               exclusion restriction, weak instrument, shift-share, Bartik]
  - label: Synthetic Control
    keywords: [synthetic control, "SCM", donor pool, placebo unit]
  - label: RCT
    keywords: [randomized controlled trial, "RCT", randomized evaluation,
               randomized experiment, treatment arm, intent-to-treat, "ITT"]
  - label: Lab Experiment
    keywords: [laboratory experiment, lab experiment, "incentivized experiment",
               subject pool, "zTree", "oTree"]
  - label: Field Experiment
    keywords: [field experiment, large-scale experiment, natural field experiment]
  - label: Survey Experiment
    keywords: [survey experiment, vignette experiment, conjoint experiment,
               online experiment]
  - label: Structural
    keywords: [structural estimation, structural model, dynamic discrete choice,
               demand estimation, "BLP", merger simulation, structural parameter,
               Euler equation estimation, indirect inference,
               simulated method of moments, "moment inequalities",
               auction model, search and matching model]
  - label: Theory
    keywords: [theoretical model, equilibrium analysis, game theory, game-theoretic,
               mechanism design, axiomatic, optimal contract, "social choice",
               revelation principle, Bayes-Nash, sequential equilibrium,
               implementation theory, comparative statics, welfare theorem]
  - label: Machine Learning
    keywords: [machine learning, deep learning, neural network, random forest,
               LASSO, causal forest, double machine learning, "double/debiased ML",
               text-as-data, embeddings]
  - label: Propensity Score
    keywords: [propensity score, propensity-score matching, inverse probability,
               weighted estimator, "IPW"]
  - label: Natural Experiment
    keywords: [natural experiment, quasi-experiment, quasi-experimental,
               policy change, sudden change, exogenous shock]

# Mapping from NEP report codes to our field labels (light layer on top of NEP).
nep_to_field:
  nep-lab: Labor & Demographic Economics
  nep-dev: Development Economics
  nep-ure: Urban, Rural & Regional Economics
  nep-law: Law & Economics
  nep-iue: Public Economics
