  nep-mac: Macroeconomics
  nep-mon: Macroeconomics
  nep-fin: Financial Economics
  nep-hea: Health, Education & Welfare
  nep-edu: Health, Education & Welfare
  nep-env: Agricultural & Environmental Economics
  nep-ene: Agricultural & Environmental Economics
  nep-exp: Microeconomics
  nep-cbe: Microeconomics
  nep-ecm: Econometrics & Methods
  nep-mic: Microeconomics
  nep-ind: Industrial Organization
  nep-int: International Economics
  nep-ifn: International Economics
